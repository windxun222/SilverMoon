<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>银月 - AI 视觉助手</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div id="camera-container">
  <video id="camera-video" autoplay playsinline muted></video>
  <canvas id="camera-canvas" hidden></canvas>
  <div id="camera-overlay">
    <div id="status-badge">
      <span id="status-dot"></span>
      <span id="status-text">初始化中...</span>
    </div>
    <div id="camera-indicator" class="camera-indicator hidden">
      <span id="camera-icon">&#x1F4F7;</span>
      <span id="camera-label">摄像头就绪</span>
    </div>
  </div>
</div>

<div id="chat-panel">
  <div id="chat-messages">
    <div class="chat-msg system-msg">&#x1F44B; 银月已就绪，对准摄像头说话吧</div>
  </div>

  <div id="chat-controls">
    <div id="interim-text" class="interim-text"></div>

    <div id="button-row">
      <button id="btn-talk" class="control-btn talk-btn" title="按住说话">
        <span class="btn-icon">&#x1F3A4;</span>
        <span class="btn-label">说话</span>
      </button>

      <button id="btn-vision" class="control-btn toggle-btn" title="视觉：AI 观察并描述画面">
        <span class="btn-icon">&#x1F441;</span>
        <span class="btn-label">视觉</span>
      </button>

      <button id="btn-speaker" class="control-btn toggle-btn" title="语音开关">
        <span class="btn-icon">&#x1F50A;</span>
        <span class="btn-label">语音</span>
      </button>

      <button id="btn-auto" class="control-btn toggle-btn" title="自动监听">
        <span class="btn-icon">&#x1F504;</span>
        <span class="btn-label">自动</span>
      </button>

      <button id="btn-mute" class="control-btn toggle-btn" title="静音麦克风">
        <span class="btn-icon">&#x1F507;</span>
        <span class="btn-label">静音</span>
      </button>
    </div>
  </div>
</div>

<script type="module" src="/static/js/camera.js"></script>
<script type="module" src="/static/js/audio.js"></script>
<script type="module" src="/static/js/websocket.js"></script>
<script type="module" src="/static/js/app.js"></script>

</body>
</html>
