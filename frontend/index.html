<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SilverMoon</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#000;color:#f0f0f0}
#cam{position:absolute;inset:0;z-index:0}
#cam video{width:100%;height:100%;object-fit:cover}
#top{position:absolute;top:0;left:0;right:0;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));z-index:1;display:flex;align-items:center;gap:8px}
.badge{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:20px;background:rgba(0,0,0,.55);font-size:13px;font-weight:500}
.dot{width:8px;height:8px;border-radius:50%;background:#ffa500;transition:background .3s}
.dot.ok{background:#4caf50}.dot.listen{background:#2196f3;animation:pulse 1s infinite}.dot.err{background:#f44336}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#chat{position:absolute;bottom:0;left:0;right:0;z-index:2;display:flex;flex-direction:column;background:linear-gradient(to top,rgba(0,0,0,.85)0%,rgba(0,0,0,.3)80%,transparent 100%);padding-bottom:max(12px,env(safe-area-inset-bottom))}
#msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px;max-height:45vh;min-height:15vh}
.msg{max-width:85%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word;animation:fadeIn .25s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.u{align-self:flex-end;background:rgba(33,150,243,.3);border:1px solid rgba(33,150,243,.5);color:#e3f2fd}
.msg.a{align-self:flex-start;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);color:#f5f5f5}
.msg.s{align-self:center;background:0 0;color:rgba(255,255,255,.5);font-size:12px;text-align:center}
.msg.v{align-self:flex-start;background:rgba(129,199,132,.15);border:1px solid rgba(129,199,132,.3);color:#c8e6c9;font-size:13px}
#ctls{padding:8px 16px 12px}
#btns{display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;padding:0 4px}
.btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;border-radius:50%;cursor:pointer;transition:transform .1s,background .3s;touch-action:manipulation}
.btn:active{transform:scale(.93)}
.btn-talk{width:68px;height:68px;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3)}
.btn-talk.active{background:rgba(244,67,54,.6);border-color:rgba(244,67,54,.8);animation:pulse .8s infinite}
.btn-talk .ic{font-size:24px}.btn-talk .lb{font-size:8px;color:rgba(255,255,255,.8)}
.btn-tog{width:52px;height:52px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.2)}
.btn-tog.on{background:rgba(76,175,80,.35);border-color:rgba(76,175,80,.6)}
.btn-tog .ic{font-size:18px}.btn-tog .lb{font-size:8px;color:rgba(255,255,255,.7)}
#inp{margin-top:4px}
#inp input{width:100%;padding:10px 16px;border-radius:24px;border:1px solid rgba(255,255,255,.3);background:rgba(0,0,0,.5);color:#fff;font-size:15px;outline:none}
#msgs::-webkit-scrollbar{width:3px}#msgs::-webkit-scrollbar-track{background:0 0}#msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:3px}
</style>
</head>
<body>
<div id="cam"><video id="v" autoplay playsinline muted></video><canvas id="c" hidden></canvas></div>
<div id="top"><div class="badge"><span class="dot" id="dot"></span><span id="st">connecting...</span></div></div>
<div id="chat">
<div id="msgs"><div class="msg s">Ready</div></div>
<div id="ctls">
<div id="btns">
<button class="btn btn-talk" id="bt"><span class="ic">*</span><span class="lb">Talk</span></button>
<button class="btn btn-tog" id="bv"><span class="ic">*</span><span class="lb">Vision</span></button>
<button class="btn btn-tog" id="bs"><span class="ic">*</span><span class="lb">Speak</span></button>
<button class="btn btn-tog" id="ba"><span class="ic">*</span><span class="lb">Auto</span></button>
<button class="btn btn-tog" id="bm"><span class="ic">*</span><span class="lb">Mute</span></button>
</div>
<div id="inp"><input type="text" id="ti" placeholder="Type and press Enter..."></div>
</div>
</div>
<script>
var WS=(location.protocol==='https:'?'wss':'ws')+'://'+location.host+'/ws';
var dot=document.getElementById('dot'),st=document.getElementById('st');
var msgs=document.getElementById('msgs'),v=document.getElementById('v'),cv=document.getElementById('c');
var bt=document.getElementById('bt'),bv=document.getElementById('bv'),bs=document.getElementById('bs');
var ba=document.getElementById('ba'),bm=document.getElementById('bm'),ti=document.getElementById('ti');
var auto=false,vis=false,spk=true,mut=false,lfc=0,vtimer=null;
var actx=null,achunks=[],atimer=null,astream=null,camStream=null;
var ws=null,rcount=0,rtimer=null,onMsgCb=null,onConnCb=null;
function wsConnect(){
 if(ws&&(ws.readyState===WebSocket.OPEN||ws.readyState===WebSocket.CONNECTING))return;
 ws=new WebSocket(WS);
 ws.onopen=function(){rcount=0;if(onConnCb)onConnCb(true)};
 ws.onmessage=function(e){try{var d=JSON.parse(e.data);if(onMsgCb)onMsgCb(d)}catch(x){}};
 ws.onclose=function(){if(onConnCb)onConnCb(false);if(!rtimer)rtimer=setTimeout(function(){rtimer=null;wsConnect()},2000)};
}
function wsSend(d){if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify(d))}
function wsOk(){return ws&&ws.readyState===WebSocket.OPEN}
function wsSetCb(cb){onMsgCb=cb.onMsg;onConnCb=cb.onConn}
function status(s){
 var m={c:['','connecting...'],ok:['ok','Connected'],l:['listen','Listening'],t:['listen','Thinking'],e:['err','Error']};
 var cl=m[s]?m[s][0]:'',tx=m[s]?m[s][1]:s;dot.className='dot '+cl;st.textContent=tx;
}
function msg(role,text){
 if(!msgs||!text)return;var el=document.createElement('div');el.className='msg '+role;el.textContent=text;msgs.appendChild(el);msgs.scrollTop=msgs.scrollHeight;
}
async function camStart(){
 if(v)v.srcObject=null;if(camStream){camStream.getTracks().forEach(function(t){t.stop()});camStream=null}
 try{camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false})}
 catch(e){camStream=await navigator.mediaDevices.getUserMedia({video:true,audio:false})}
 v.srcObject=camStream;await v.play();
 await new Promise(function(r){v.addEventListener('loadeddata',r,{once:true})});
}
function camFrame(){
 if(!v||!cv||v.readyState<2)return null;
 var vw=v.videoWidth,vh=v.videoHeight;if(!vw||!vh)return null;
 var w=vw,h=vh,s=Math.min(640/Math.max(w,h),1);w=Math.round(w*s);h=Math.round(h*s);
 cv.width=w;cv.height=h;cv.getContext('2d').drawImage(v,0,0,w,h);
 return cv.toDataURL('image/jpeg',0.7).split(',')[1];
}
function camStop(){if(camStream){camStream.getTracks().forEach(function(t){t.stop()});camStream=null}if(v)v.srcObject=null}
function query(text,img){
 if(!text||!text.trim()||!wsOk())return;
 status('t');msg('u',text.trim());
 var q={type:'query',text:text.trim()};if(img)q.image=img;wsSend(q);
}
var camStarted=false;
function startCam(){if(camStarted)return;camStarted=true;camStart().catch(function(e){console.warn('cam:',e)})}
function vq(){if(!wsOk()||!vis)return;var f=camFrame();if(!f)return;query('describe what you see in one sentence.',f);lfc=Date.now()}
function vstart(){vstop();if(!vis)return;vtimer=setInterval(function(){if(vis&&wsOk())vq()},4000)}
function vstop(){if(vtimer){clearInterval(vtimer);vtimer=null}}
function vtoggle(){vis=!vis;bv.classList.toggle('on',vis);vis?(startCam(),vstart(),vq()):(vstop(),status(wsOk()?'ok':'c'))}
function hasSpeech(samples){if(!samples||!samples.length)return false;var s=0;for(var i=0;i<samples.length;i++)s+=Math.abs(samples[i]);return(s/samples.length)>50}
function wavenc(samples){
 var n=samples.length,b=new ArrayBuffer(44+n*2),v=new DataView(b);
 function w(o,s){for(var i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i))}
 w(0,'RIFF');v.setUint32(4,36+n*2,true);w(8,'WAVE');w(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);
 v.setUint16(22,1,true);v.setUint32(24,16000,true);v.setUint32(28,32000,true);v.setUint16(32,2,true);v.setUint16(34,16,true);
 w(36,'data');v.setUint32(40,n*2,true);
 for(var i=0;i<n;i++)v.setInt16(44+i*2,Math.max(-32768,Math.min(32767,samples[i])),true);
 return new Blob([b],{type:'audio/wav'});
}
var _acnt=0;
async function astart(){
 astop();if(!auto||mut)return;
 try{
  actx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:16000});
  if(actx.state!=='running')await actx.resume();
  astream=await navigator.mediaDevices.getUserMedia({audio:{sampleRate:16000,channelCount:1,echoCancellation:true,noiseSuppression:true}});
  var src=actx.createMediaStreamSource(astream),proc=actx.createScriptProcessor(4096,1,1);
  achunks=[];_acnt=0;src.connect(proc);proc.connect(actx.destination);
  proc.onaudioprocess=function(e){var d=e.inputBuffer.getChannelData(0);_acnt+=d.length;for(var i=0;i<d.length;i++)achunks.push(Math.round(d[i]*32767))};
  status('l');
  atimer=setInterval(async function(){
   if(!achunks.length)return;var hasSp=hasSpeech(achunks);if(!hasSp){achunks=[];return}var w=wavenc(achunks);achunks=[];status('t');
   try{var r=await fetch('/asr',{method:'POST',body:w}),d=await r.json();if(d.text&&d.text.trim()){var f=camFrame();query(d.text.trim(),f)}}catch(e){}
  },4000);
 }catch(e){msg('s','Mic error: '+e.message);status('e')}
}
function astop(){if(atimer){clearInterval(atimer);atimer=null}if(actx){try{actx.close()}catch(e){}actx=null}if(astream){astream.getTracks().forEach(function(t){t.stop()});astream=null}achunks=[]}
var _a=null;
function ttsInit(){_a=document.createElement('audio');_a.style.display='none';document.body.appendChild(_a)}
async function tts(t){
 if(!t)return;if(!_a)ttsInit();
 try{var r=await fetch('/tts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t})});if(!r.ok)return;var b=await r.blob(),u=URL.createObjectURL(b);_a.src=u;await _a.play()}catch(e){}
}
bt.addEventListener('pointerdown',function(e){e.preventDefault();if(mut)return;bt.classList.add('active')});
bt.addEventListener('pointerup',function(e){e.preventDefault();bt.classList.remove('active')});
bt.addEventListener('pointerleave',function(){bt.classList.remove('active')});
bt.addEventListener('pointercancel',function(){bt.classList.remove('active')});
bv.addEventListener('click',function(){vtoggle()});
function atoggle(){auto=!auto;ba.classList.toggle('on',auto);auto?astart():astop()}
ba.addEventListener('click',function(){startCam();atoggle()});
function mtoggle(){mut=!mut;bm.classList.toggle('on',mut);bm.querySelector('.ic').textContent=mut?'ON':'OFF';if(mut)astop();else if(auto)astart()}
bm.addEventListener('click',mtoggle);
function stoggle(){spk=!spk;bs.classList.toggle('on',!spk);bs.querySelector('.ic').textContent=spk?'ON':'OFF'}
bs.addEventListener('click',stoggle);
ti.addEventListener('keydown',function(e){if(e.key==='Enter'&&ti.value.trim()){query(ti.value.trim());ti.value=''}});
wsSetCb({
 onMsg:function(d){
  if(d.type==='response'){msg(vis?'v':'a',d.text);if(spk&&!vis)tts(d.text);status('ok')}
  else if(d.type==='error'){msg('s','Error: '+d.detail);status('e')}
 },
 onConn:function(c){status(c?'ok':'c')}
});
wsConnect();
setTimeout(function(){if(st.textContent==='connecting...')status('ok')},3000);
setInterval(function(){if(wsOk())wsSend({type:'ping'})},30000);
window.addEventListener('beforeunload',function(){vstop();astop();camStop();if(ws)ws.close()});
</script>
</body>
</html>
